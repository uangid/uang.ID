<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>$ UangId AI PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#1e293b;padding:15px;border-radius:14px;margin-top:15px}
input,select{width:100%;padding:10px;border:none;border-radius:8px;margin:5px 0}
button{padding:10px;border:none;border-radius:8px;background:#22c55e;color:#fff;cursor:pointer}
h1{color:#22c55e}
</style>
</head>

<body>

<div class="container" id="auth">
<h1>$ UangId</h1>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Daftar</button>
<button onclick="loginGoogle()">Login Gmail</button>
<button onclick="resetPassword()">Lupa Password</button>
</div>

<div class="container" id="app" style="display:none">

<h1>$ UangId Dashboard</h1>
<img id="photo" width="60" style="border-radius:50%">

<div class="card">
<input id="income" placeholder="Pemasukan">
<input id="expense" placeholder="Pengeluaran">
<input id="emergency" placeholder="Dana Darurat">
<input id="invest" placeholder="Investasi">
<button onclick="saveFinancial()">Simpan</button>
</div>

<div class="card">
<h3>Tambah Transaksi</h3>
<input id="t_amount" placeholder="Jumlah">
<input id="t_desc" placeholder="Keterangan">
<select id="t_type">
<option value="expense">Pengeluaran</option>
<option value="income">Pemasukan</option>
</select>
<button onclick="addTransaction()">Tambah</button>
</div>

<div class="card">
<h3>Target Tabungan</h3>
<input id="target" placeholder="Target">
<button onclick="setTarget()">Set</button>
<div id="progress"></div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card" id="ai"></div>

<div class="card">
<ul id="history"></ul>
</div>

<button onclick="exportExcel()">Export Excel</button>
<button onclick="logout()">Logout</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 CONFIG SUDAH DIISI */
const firebaseConfig = {
  apiKey: "AIzaSyCLbSEl6FIvAIOtlAtWFhEtampGubOnBLw",
  authDomain: "uangid-ab245.firebaseapp.com",
  projectId: "uangid-ab245"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let userData={},transactions=[],chart,targetValue=0;

onAuthStateChanged(auth, async user=>{
if(user){
authBox.style.display="none";
app.style.display="block";
photo.src=user.photoURL||"https://i.pravatar.cc/100";
await load(user.uid);
}
});

window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.register=()=>createUserWithEmailAndPassword(auth,email.value,password.value);
window.loginGoogle=()=>signInWithPopup(auth,new GoogleAuthProvider());
window.resetPassword=()=>sendPasswordResetEmail(auth,email.value);
window.logout=()=>signOut(auth).then(()=>location.reload());

async function load(uid){
const snap=await getDoc(doc(db,"users",uid));
if(snap.exists())userData=snap.data();

const ts=await getDocs(collection(db,"users",uid,"transactions"));
transactions=[];
ts.forEach(d=>transactions.push(d.data()));

renderAll();
}

window.saveFinancial=async()=>{
const uid=auth.currentUser.uid;
userData={
income:+income.value,
expense:+expense.value,
emergency:+emergency.value,
invest:+invest.value
};
await setDoc(doc(db,"users",uid),userData);
renderAll();
};

window.addTransaction=async()=>{
const uid=auth.currentUser.uid;
const data={
amount:+t_amount.value,
desc:t_desc.value,
type:t_type.value,
time:new Date().toISOString()
};
await addDoc(collection(db,"users",uid,"transactions"),data);
transactions.push(data);
renderAll();
};

function renderAll(){
renderChart();
renderHistory();
analyzeAI();
updateProgress();
}

function renderChart(){
if(chart)chart.destroy();
chart=new Chart(chart,{
type:"bar",
data:{
labels:["Income","Expense","Emergency","Invest"],
datasets:[{data:[
userData.income||0,
userData.expense||0,
userData.emergency||0,
userData.invest||0
]}]
}
});
}

function renderHistory(){
history.innerHTML="";
transactions.forEach(t=>{
let li=document.createElement("li");
li.innerText=`${t.type} - Rp ${t.amount} (${t.desc})`;
history.appendChild(li);
});
}

function analyzeAI(){
let income=userData.income||0,expense=userData.expense||0;
let status="Aman";
if(expense>income)status="Boros";
else if(expense>income*0.7)status="Waspada";

ai.innerHTML=`🤖 Status: ${status}<br>Sisa: Rp ${income-expense}`;
}

window.setTarget=()=>{
targetValue=+target.value;
updateProgress();
};

function updateProgress(){
let total=(userData.income||0)-(userData.expense||0);
let p=targetValue?(total/targetValue)*100:0;
progress.innerHTML=`${p.toFixed(1)}%`;
}

window.exportExcel=()=>{
let ws1=XLSX.utils.json_to_sheet([userData]);
let ws2=XLSX.utils.json_to_sheet(transactions);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws1,"Keuangan");
XLSX.utils.book_append_sheet(wb,ws2,"Transaksi");
XLSX.writeFile(wb,"UangId.xlsx");
};

</script>

</body>
</html>
